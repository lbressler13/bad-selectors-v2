name: Lint and Test

on:
  workflow_dispatch:
    inputs:
      testType:
        description: App Test Type
        default: unit
        type: choice
        options:
          - unit
          - robolectric
          - all
  workflow_call:
    inputs:
      testType:
        required: true
        default: all
        type: string
  pull_request:
  push:

env:
  USERNAME: ${{ secrets.USERNAME }}
  TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  dependencies:
    name: "Cache Dependencies"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-write-only: true
          cache-cleanup: always

      - name: Linting
        run: ./gradlew ktlintCheck


  lint:
    name: "Linting"
    runs-on: ubuntu-latest
    needs: ["dependencies"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Linting
        run: ./gradlew ktlintCheck

  app-unit-tests:
    name: "Unit Tests (app module)"
    runs-on: ubuntu-latest
    needs: ["dependencies"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Tests
        run: |
          TEST_TYPE=${{ inputs.testType || (github.event_name == 'push' && 'unit') || (github.event_name == 'pull_request' && 'all') || 'all' }}
          ./gradlew :app:test -PtestType="${TEST_TYPE}" --stacktrace

  customview-unit-tests:
    name: "Unit Tests (customview module)"
    runs-on: ubuntu-latest
    needs: ["dependencies"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Tests
        run: ./gradlew :customview:test --stacktrace
