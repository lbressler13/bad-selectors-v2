name: Lint and Test

on:
  workflow_dispatch:
    inputs:
      testType:
        description: App Test Type
        default: unit
        type: choice
        options:
          - unit
          - robolectric
          - all
      integrationTests:
        description: Run integration tests
        default: true
        type: boolean
  workflow_call:
    inputs:
      integrationTests:
        default: true
        type: boolean
        required: false
  pull_request:
  push:

env:
  USERNAME: ${{ secrets.USERNAME }}
  TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  dependencies:
    name: "Cache Dependencies"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-write-only: true
          cache-cleanup: always

      - name: Install Dependencies
        run: ./gradlew build  # TODO confirm this command at a more reasonable hour of the day

  lint:
    name: "Linting"
    runs-on: ubuntu-latest
    needs: ["dependencies"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Linting
        run: ./gradlew ktlintCheck

  app-unit-tests:
    name: "Unit Tests (app module)"
    runs-on: ubuntu-latest
    needs: ["dependencies"]
    # run on push if not on master, or if integration tests is passed and not false
    if: ${{ (github.event_name != 'push' || github.ref == 'refs/heads/main') || inputs.integrationTests == true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Tests
        run: |
          ./gradlew :app:test -PtestType="unit" --stacktrace

  app-integration-tests:
    name: "Integration Tests (app module)"
    runs-on: ubuntu-latest
    needs: ["dependencies"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Tests
        run: |
          ./gradlew :app:test -PtestType="robolectric" --stacktrace

  customview-unit-tests:
    name: "Unit Tests (customview module)"
    runs-on: ubuntu-latest
    needs: ["dependencies"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Java Version
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: always

      - name: Tests
        run: ./gradlew :customview:test --stacktrace
